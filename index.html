<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CAIAF 評量光譜實驗室 (Firebase 雲端連線版)</title>
  <style>
    :root {
      --bg-dark: #070B14;
      --bg-panel: rgba(13, 22, 43, 0.75);
      --border-light: rgba(0, 240, 255, 0.25);
      --text: #E0F2FE;
      --sub: #94A3B8;
      --cyan: #00F0FF;
      --optA: #00E5FF; 
      --optB: #3B82F6; 
      --optC: #A855F7; 
      --glow-A: 0 0 15px rgba(0, 229, 255, 0.4);
      --glow-B: 0 0 15px rgba(59, 130, 246, 0.4);
      --glow-C: 0 0 15px rgba(168, 85, 247, 0.4);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: "Noto Sans TC", sans-serif;
      color: var(--text); background: var(--bg-dark);
      min-height: 100vh; display: flex; flex-direction: column;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
      background-size: 30px 30px; z-index: 0;
    }

    .screen { display: none; flex: 1; position: relative; z-index: 1; width: 100%; animation: fadeIn 0.4s ease; }
    .screen.active { display: flex; flex-direction: column; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .glass-panel {
      background: var(--bg-panel); backdrop-filter: blur(16px);
      border: 1px solid var(--border-light); border-radius: 16px; padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,.6);
    }

    button { border: none; cursor: pointer; border-radius: 12px; font-weight: 600; transition: 0.2s; }
    .btn-primary {
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(0, 119, 255, 0.4));
      border: 1px solid var(--cyan); color: var(--cyan); padding: 16px 24px; font-size: 18px;
    }
    .btn-primary:hover { box-shadow: var(--glow-A); text-shadow: 0 0 8px var(--cyan); }

    /* Role Selection */
    #roleScreen { align-items: center; justify-content: center; text-align: center; }
    .role-btn {
      width: 100%; max-width: 400px; padding: 24px; margin-bottom: 16px; font-size: 20px;
      background: rgba(13, 22, 43, 0.8); border: 1px solid rgba(0, 240, 255, 0.3); color: #fff;
    }

    /* Voter UI */
    #voterScreen { padding: 16px; max-width: 600px; margin: 0 auto; }
    .mobile-vote-btn {
      width: 100%; padding: 20px; margin-bottom: 14px; text-align: left;
      background: rgba(0,0,0,.4); border: 1px solid rgba(255,255,255,.1); color: #fff;
    }
    .mobile-vote-btn.selected { border-color: var(--cyan); box-shadow: var(--glow-A); }

    /* Host UI */
    #hostScreen { padding: 24px; display: flex; flex-direction: column; }
    .host-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; flex: 1; min-height: 0; }
    .stat-bar-bg { width: 100%; height: 16px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-top: 8px; }
    .stat-bar-fill { height: 100%; width: 0%; border-radius: 8px; transition: width 0.5s ease; }
    .fill-optA { background: var(--optA); } .fill-optB { background: var(--optB); } .fill-optC { background: var(--optC); }

    /* Overlay */
    .analyzing-overlay {
      position: fixed; inset: 0; background: rgba(7, 11, 20, 0.95);
      display: none; align-items: center; justify-content: center; z-index: 100;
      color: var(--cyan); font-size: 40px; font-family: monospace; letter-spacing: 8px;
    }
    .analyzing-overlay.play { display: flex; }
    .scanner-line { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--cyan); animation: scan 1.2s infinite alternate; }
    @keyframes scan { from { top: 0; } to { top: 100%; } }

    .verdict-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 101; }
    .verdict-card { background: var(--bg-panel); border: 1px solid var(--cyan); padding: 40px; max-width: 800px; width: 90%; border-radius: 20px; }

    /* Footer 樣式 */
    .app-footer {
      text-align: center; padding: 20px 16px; color: var(--sub); font-size: 13px; 
      font-family: monospace; position: relative; z-index: 10; opacity: 0.7;
      letter-spacing: 1px; margin-top: auto; width: 100%;
    }
  </style>
</head>
<body>

  <div id="roleScreen" class="screen active">
    <div class="glass-panel" style="max-width: 500px;">
      <div id="connBadge" class="btn-primary" style="font-size: 12px; padding: 4px 12px; margin-bottom: 20px; display: inline-block; border-radius: 20px;">Firebase 狀態載入中...</div>
      <h1>CAIAF 光譜實驗室</h1>
      <p style="color: var(--sub); margin-bottom: 30px;">請選擇連線身分</p>
      <button class="role-btn" onclick="initApp('host')">💻 啟動全息主控台</button>
      <button class="role-btn" onclick="initApp('voter')">📱 連線現場顧問群</button>
    </div>
  </div>

  <div id="voterScreen" class="screen">
    <div id="voterCaseContent">
      <h2 id="voterTitle">載入中...</h2>
      <p id="voterDesc" style="color: var(--sub);"></p>
      <div id="voterOptions"></div>
      <div id="waitMessage" style="display:none; text-align:center; padding: 40px;">
        <h3 style="color: var(--cyan);">📡 數據已傳輸</h3>
        <p>請抬頭觀看大螢幕解鎖分析結果</p>
      </div>
    </div>
    <div id="voterVerdictArea" style="display:none;">
      <h2 id="voterVerdictResult" style="color: #fff;"></h2>
      <div id="voterVerdictLevel" style="color: var(--cyan); margin-bottom: 20px;"></div>
      <div class="glass-panel">
        <h4>⚠️ 核心反思</h4>
        <ul id="voterRisks"></ul>
      </div>
    </div>
  </div>

  <div id="hostScreen" class="screen">
    <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
      <h2 style="color: var(--cyan);">CAIAF_LAB // 數據監控中</h2>
      <div>
        <button onclick="prevCase()">[上一個]</button>
        <button onclick="nextCase()">[下一個]</button>
      </div>
    </div>
    <div class="host-grid">
      <div class="glass-panel">
        <h1 id="hostTitle"></h1>
        <p id="hostDesc"></p>
        <div id="hostQuotes"></div>
      </div>
      <div class="glass-panel">
        <h3 style="text-align:center;">即時決策分佈</h3>
        <div id="hostStatsArea"></div>
        <button class="btn-primary" style="width:100%; margin-top: 40px;" onclick="announceVerdict()">⚡ 啟動 CAIAF 框架分析</button>
      </div>
    </div>
  </div>

  <div class="analyzing-overlay" id="analyzingOverlay"><div class="scanner-line"></div>ANALYZING...</div>
  <div class="verdict-overlay" id="verdictOverlay">
    <div class="verdict-card">
      <h1 id="modalVerdictResult"></h1>
      <h3 id="modalVerdictLevel" style="color: var(--cyan);"></h3>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left;">
        <div><h4>⚠️ 核心反思</h4><ul id="modalRisks"></ul></div>
        <div><h4>💡 教師建議</h4><ul id="modalTeacher"></ul></div>
      </div>
      <button class="btn-primary" style="margin-top: 20px;" onclick="closeVerdict()">關閉分析</button>
    </div>
  </div>

  <!-- 專屬版權與版本號宣告 -->
  <footer class="app-footer">
    Designed by 日安匕禾 Bever Tech System | Version: v3.0.2
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    // 🏆 您的 Firebase 金鑰
    const firebaseConfig = {
      apiKey: "AIzaSyD6rFjTduTHM71uD9uF41ZZGnaj-2TQcag",
      authDomain: "music-sel-wordcloud.firebaseapp.com",
      projectId: "music-sel-wordcloud",
      storageBucket: "music-sel-wordcloud.firebasestorage.app",
      messagingSenderId: "59064151650",
      appId: "1:59064151650:web:f0f9db6b073838524deb3b",
      measurementId: "G-MZHCG905XL"
    };

    const cases = [
      {
        title: "樣本 01：信任危機",
        desc: "偵測軟體顯示 80% AI 生成，但學生堅持只用了 Grammarly 潤飾。如果是你，會判定作弊嗎？",
        quotes: [["學生", "我只修了文法，為什麼判定我作弊？"], ["系統", "偵測工具準確率有時僅 22%，且對非母語人士有偏見。"]],
        options: [{id:"optA", label:"A", text:"相信軟體直接給零分"}, {id:"optB", label:"B", text:"退回要求課堂重寫"}, {id:"optC", label:"C", text:"改用口頭答辯確認思路"}],
        verdict: "應放棄單一依賴 AI 偵測工具", level: "核心：評量轉型",
        risks: ["偵測軟體存在高度偽陽性", "對非母語學生極不公平"], teacher: ["轉向過程導向評量", "建立互信的 AI 使用規範"]
      },
      {
        title: "樣本 02：時空錯位",
        desc: "學生用 AI 總結文獻並根據大綱寫作業。這行為在哪個階段最該被禁止？",
        options: [{id:"optA", label:"A", text:"國小三年級"}, {id:"optB", label:"B", text:"大學一年級"}, {id:"optC", label:"C", text:"研究所博士班"}],
        verdict: "判定取決於教學目標對準性", level: "核心：教育階段分流",
        risks: ["國小生使用會剝奪歸納能力訓練", "高教階段則是高效協作"], teacher: ["區分 K-12 與高等教育標準"]
      },
      {
        title: "樣本 03：看不見的危險",
        desc: "老師將全班真實姓名與輔導紀錄貼上 ChatGPT 請它寫評語。這違反了什麼？",
        options: [{id:"optA", label:"A", text:"透明性"}, {id:"optB", label:"B", text:"責任歸屬"}, {id:"optC", label:"C", text:"隱私與資料保護"}],
        verdict: "嚴重違反隱私與資料保護", level: "核心：教師道德底線",
        risks: ["學生個資外洩成為訓練數據"], teacher: ["使用前必須去識別化", "嚴禁上傳敏感個資"]
      },
      {
        title: "樣本 04：未來的模樣",
        desc: "學生戴智慧眼鏡寫程式，AI 即時語音導航 debug。這屬於哪個等級？",
        options: [{id:"optA", label:"A", text:"Level 4"}, {id:"optB", label:"B", text:"Level 5"}, {id:"optC", label:"C", text:"Level 6 (即時互動助理)"}],
        verdict: "Level 6: 進階 AI 整合", level: "核心：框架未來擴展性",
        risks: ["傳統評分已無意義"], teacher: ["著重於學生對 AI 建議的批判能力"]
      },
      {
        title: "樣本 05：裝備差異的戰場",
        desc: "付費高級 AI 做的圖表比免費版精美很多，導致成績落差。這引發什麼問題？",
        options: [{id:"optA", label:"A", text:"責任歸屬"}, {id:"optB", label:"B", text:"公平與包容性"}, {id:"optC", label:"C", text:"教學對準"}],
        verdict: "破壞公平與包容原則", level: "核心：數位鴻溝",
        risks: ["評量變成家庭財力的競爭"], teacher: ["確保所有學生擁有同等工具存取權"]
      },
      {
        title: "樣本 06：誰才是作者？",
        desc: "AI 大幅提升了草稿的詞彙層次。學生交稿時應採取什麼具體行動？",
        options: [{id:"optA", label:"A", text:"視為共同作者"}, {id:"optB", label:"B", text:"附上無 AI 原始草稿"}, {id:"optC", label:"C", text:"全部用引號標註"}],
        verdict: "Level 3 規範：必須附上原始草稿", level: "核心：寫作透明性",
        risks: ["模糊了學生真實進步幅度"], teacher: ["落實 Level 3 的透明化申報流程"]
      }
    ];

    let currentRole = null;
    let currentCaseIndex = 0;
    let userId = null;
    const appId = 'caiaf-lab-v1';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    signInAnonymously(auth);
    onAuthStateChanged(auth, (user) => {
      if (user) {
        userId = user.uid;
        document.getElementById('connBadge').innerText = "SYS.ONLINE // 雲端同步中";
        if(currentRole === 'host') {
          setDoc(doc(db, 'state', appId), { index: currentCaseIndex, status: 'voting' });
          listenVotes();
        }
        if(currentRole === 'voter') listenState();
      }
    });

    window.initApp = (role) => {
      currentRole = role;
      document.getElementById('roleScreen').classList.remove('active');
      if(role === 'host') {
        document.getElementById('hostScreen').classList.add('active');
        updateHostUI();
        if (userId) {
          setDoc(doc(db, 'state', appId), { index: 0, status: 'voting' });
          listenVotes();
        }
      } else {
        document.getElementById('voterScreen').classList.add('active');
        if (userId) {
          listenState();
        }
      }
    };

    // Host Logic
    function updateHostUI() {
      const c = cases[currentCaseIndex];
      document.getElementById('hostTitle').innerText = c.title;
      document.getElementById('hostDesc').innerText = c.desc;
      document.getElementById('hostStatsArea').innerHTML = c.options.map(opt => `
        <div style="margin-bottom:20px;">
          <div style="display:flex; justify-content:space-between;"><span>${opt.text}</span><span id="count-${opt.id}">0 票</span></div>
          <div class="stat-bar-bg"><div id="bar-${opt.id}" class="stat-bar-fill fill-${opt.id}"></div></div>
        </div>
      `).join('');
    }

    function listenVotes() {
      onSnapshot(collection(db, 'votes', appId, currentCaseIndex.toString()), (snap) => {
        let counts = { optA:0, optB:0, optC:0 };
        snap.forEach(d => counts[d.data().vote]++);
        const total = snap.size || 1;
        ['optA','optB','optC'].forEach(id => {
          document.getElementById(`count-${id}`).innerText = `${counts[id]} 票`;
          document.getElementById(`bar-${id}`).style.width = `${(counts[id]/total)*100}%`;
        });
      });
    }

    window.nextCase = () => { if(currentCaseIndex < cases.length-1) { currentCaseIndex++; updateHostUI(); setDoc(doc(db, 'state', appId), { index: currentCaseIndex, status: 'voting' }); } };
    window.prevCase = () => { if(currentCaseIndex > 0) { currentCaseIndex--; updateHostUI(); setDoc(doc(db, 'state', appId), { index: currentCaseIndex, status: 'voting' }); } };

    window.announceVerdict = () => {
      document.getElementById('analyzingOverlay').classList.add('play');
      setTimeout(() => {
        document.getElementById('analyzingOverlay').classList.remove('play');
        const c = cases[currentCaseIndex];
        document.getElementById('modalVerdictResult').innerText = c.verdict;
        document.getElementById('modalVerdictLevel').innerText = c.level;
        document.getElementById('modalRisks').innerHTML = c.risks.map(r => `<li>${r}</li>`).join('');
        document.getElementById('modalTeacher').innerHTML = c.teacher.map(t => `<li>${t}</li>`).join('');
        document.getElementById('verdictOverlay').style.display = 'flex';
        setDoc(doc(db, 'state', appId), { index: currentCaseIndex, status: 'verdict' });
      }, 1500);
    };

    window.closeVerdict = () => { document.getElementById('verdictOverlay').style.display = 'none'; };

    // Voter Logic
    function listenState() {
      onSnapshot(doc(db, 'state', appId), (ds) => {
        // --- 這裡加上了防呆機制 ---
        if(ds.exists()){
          const data = ds.data();
          currentCaseIndex = data.index;
          if(data.status === 'voting') loadVoterCase();
          else showVoterVerdict();
        } else {
          // 若主控台尚未開啟，顯示明確的等待訊息
          document.getElementById('voterTitle').innerText = "⏳ 等待連線中...";
          document.getElementById('voterDesc').innerText = "請等待講者在大螢幕上啟動系統與發送題目。";
          document.getElementById('voterOptions').innerHTML = "";
          document.getElementById('voterCaseContent').style.display = 'block';
          document.getElementById('voterVerdictArea').style.display = 'none';
          document.getElementById('waitMessage').style.display = 'none';
        }
      });
    }

    function loadVoterCase() {
      const c = cases[currentCaseIndex];
      document.getElementById('voterTitle').innerText = c.title;
      document.getElementById('voterDesc').innerText = c.desc;
      document.getElementById('voterOptions').innerHTML = c.options.map(opt => `
        <button class="mobile-vote-btn" onclick="submitVote('${opt.id}', this)">${opt.text}</button>
      `).join('');
      document.getElementById('voterCaseContent').style.display = 'block';
      document.getElementById('voterVerdictArea').style.display = 'none';
      document.getElementById('waitMessage').style.display = 'none';
    }

    window.submitVote = (type, btn) => {
      setDoc(doc(db, 'votes', appId, currentCaseIndex.toString(), userId), { vote: type });
      document.getElementById('voterOptions').style.display = 'none';
      document.getElementById('waitMessage').style.display = 'block';
    };

    function showVoterVerdict() {
      const c = cases[currentCaseIndex];
      document.getElementById('voterVerdictResult').innerText = c.verdict;
      document.getElementById('voterVerdictLevel').innerText = c.level;
      document.getElementById('voterRisks').innerHTML = c.risks.map(r => `<li>${r}</li>`).join('');
      document.getElementById('voterCaseContent').style.display = 'none';
      document.getElementById('voterVerdictArea').style.display = 'block';
    }

    window.goHome = () => location.reload();
  </script>
</body>
</html>
