<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>暨南 IEQ SCHOOL</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .lego-baseplate {
      background-color: #237841;
      background-image: radial-gradient(circle at 50% 50%, #175e30 4px, transparent 4px);
      background-size: 24px 24px;
    }
    .lego-wall {
      background-color: #f8fafc;
      background-image: 
        linear-gradient(#cbd5e1 2px, transparent 2px),
        linear-gradient(90deg, #cbd5e1 2px, transparent 2px);
      background-size: 60px 30px;
      background-position: -2px -2px, -2px -2px;
    }
    .style-stroke {
      -webkit-text-stroke: 2px black;
    }
    @keyframes sway {
      0%, 100% { transform: rotate(-12deg) translateX(-4px); }
      50% { transform: rotate(12deg) translateX(4px); }
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body class="bg-[#ffcf00] font-sans antialiased overflow-x-hidden">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { Coins, Star, AlertTriangle, CheckSquare, RefreshCcw, BookOpen } from 'https://esm.sh/lucide-react@0.292.0';

    const INITIAL_BUDGET = 1000;
    const INITIAL_SCORE = 55;

    const ISSUES = {
      thermal: {
        id: 'thermal', emoji: '🥶', emojis: ['🥶', '🤧', '🧊'], name: '熱舒適度',
        studentQuote: '「校長，我們快冷死了！有 69% 的同學覺得教室像冰箱！」',
        paperFact: '📝 論文數據：冬季缺乏暖氣與保溫層，55% 的學生必須穿厚重外套上課。',
        options: [
          { text: '買電暖器並緊閉門窗 (花費 $500)', cost: 500, impact: { thermal: +40, iaq: -40, acoustic: 0, ergonomic: 0, lighting: 0, score: -5 }, resultText: '溫度上升了！但門窗緊閉導致二氧化碳濃度飆高，大家開始昏昏欲睡...(空氣品質大幅下降)' },
          { text: '要求學生自己多穿衣服 (免費)', cost: 0, impact: { thermal: +10, iaq: +5, acoustic: 0, ergonomic: 0, lighting: 0, score: -10 }, resultText: '省下了錢！但學生依然覺得很不舒服，整體滿意度下降了。' }
        ]
      },
      iaq: {
        id: 'iaq', emoji: '😴', emojis: ['😴', '🥱', '😵‍💫'], name: '空氣品質',
        studentQuote: '「Zzz... 教室好悶，有 69% 的人都覺得好想睡覺...」',
        paperFact: '📝 論文數據：缺乏獨立通風系統，教室內 CO2 濃度過高，且常有異味。',
        options: [
          { text: '打開所有窗戶通風 (免費)', cost: 0, impact: { thermal: -30, iaq: +50, acoustic: -30, ergonomic: 0, lighting: 0, score: -5 }, resultText: '空氣變清新了！但是外面的冷風灌進來，且馬路噪音變超大！(這就是論文指出的指標交互影響)' },
          { text: '安裝機械通風系統 (花費 $800)', cost: 800, impact: { thermal: -5, iaq: +50, acoustic: -10, ergonomic: 0, lighting: 0, score: +20 }, resultText: '空氣改善了，但預算大失血！而且通風設備運轉帶來了一點點噪音。' }
        ]
      },
      acoustic: {
        id: 'acoustic', emoji: '🙉', emojis: ['🙉', '😖', '💢'], name: '聲學舒適度',
        studentQuote: '「外面車子好吵，同學講話也有回音，41%的人覺得很煩躁！」',
        paperFact: '📝 論文數據：內部缺乏吸音材質，外部則有交通噪音干擾。',
        options: [
          { text: '在天花板塗抹「吸音泥」 (花費 $300)', cost: 300, impact: { thermal: 0, iaq: 0, acoustic: +40, ergonomic: 0, lighting: 0, score: +15 }, resultText: '完美的被動式設計！吸音泥有效減少了回音，且花費在可接受範圍內。' },
          { text: '大聲廣播叫大家安靜 (花費 $0)', cost: 0, impact: { thermal: 0, iaq: 0, acoustic: +5, ergonomic: 0, lighting: 0, score: -10 }, resultText: '暫時安靜了 5 分鐘，但外面的車聲還是很大，而且學生覺得你很兇。' }
        ]
      },
      ergonomic: {
        id: 'ergonomic', emoji: '🪑', emojis: ['🪑', '🩹', '😫'], name: '傢俱與人體工學',
        studentQuote: '「這木頭椅子好硬又太高，坐一整天背超級痛的啦！」',
        paperFact: '📝 論文數據：受限於預算，學校難以汰換老舊的木製傢俱，超過 30% 學生因為不符合人體工學而感到身體不適。',
        options: [
          { text: '購買全新可調式人體工學椅 (花費 $600)', cost: 600, impact: { thermal: 0, iaq: 0, acoustic: 0, ergonomic: +40, lighting: 0, score: +15 }, resultText: '學生坐得超舒服！但是預算大失血，校長你的錢包在哭泣。' },
          { text: '請工友修理並加裝軟墊 (花費 $150)', cost: 150, impact: { thermal: 0, iaq: 0, acoustic: 0, ergonomic: +25, lighting: 0, score: +10 }, resultText: '花小錢解決大問題！雖然不是全新的，但舒適度大幅提升，是個務實的好選擇。' }
        ]
      },
      lighting: {
        id: 'lighting', emoji: '💡', emojis: ['💡', '👀', '✨'], name: '照明舒適度',
        studentQuote: '「教室的燈光很亮很舒服，86% 的人都很滿意喔！」',
        paperFact: '📝 論文數據：照明是巴勒斯坦學校表現最好的一環，歸功於 LED 燈的普及與良好的自然採光。',
        options: [
          { text: '表揚總務處 (獲得教育局獎勵 $200)', cost: -200, impact: { thermal: 0, iaq: 0, acoustic: 0, ergonomic: 0, lighting: 0, score: +5 }, resultText: '保持良好的 IEQ 也能帶來正面效益！預算增加了。' }
        ]
      }
    };

    const STUDENTS_GRID = [
      { id: 0, defaultFace: '👦', deskColor: 'bg-[#e3000b]' }, 
      { id: 1, defaultFace: '👧', deskColor: 'bg-[#0055bf]', issueKey: 'thermal' }, 
      { id: 2, defaultFace: '🤓', deskColor: 'bg-[#e3000b]' },
      { id: 3, defaultFace: '👩', deskColor: 'bg-[#0055bf]' },
      { id: 4, defaultFace: '👦', deskColor: 'bg-[#e3000b]', issueKey: 'iaq' },     
      { id: 5, defaultFace: '👨', deskColor: 'bg-[#0055bf]', issueKey: 'ergonomic' },
      { id: 6, defaultFace: '👧', deskColor: 'bg-[#0055bf]' },
      { id: 7, defaultFace: '👦', deskColor: 'bg-[#e3000b]', issueKey: 'acoustic' }, 
      { id: 8, defaultFace: '👩', deskColor: 'bg-[#0055bf]' },
      { id: 9, defaultFace: '🤓', deskColor: 'bg-[#e3000b]' },
      { id: 10, defaultFace: '👧', deskColor: 'bg-[#0055bf]', issueKey: 'lighting' },
      { id: 11, defaultFace: '👦', deskColor: 'bg-[#e3000b]' },
    ];

    const LegoButton = ({ children, colorClass, onClick, disabled }) => (
      <button onClick={onClick} disabled={disabled} className={`relative border-4 border-black font-black uppercase tracking-wider py-3 px-6 rounded-md transition-all ${colorClass} ${disabled ? 'opacity-50 cursor-not-allowed' : 'shadow-[4px_4px_0_#000] hover:brightness-110 active:translate-y-1 active:translate-x-1 active:shadow-none'}`}>
        <div className="absolute top-1 left-2 right-2 h-2 bg-white/20 rounded-full pointer-events-none"></div>
        {children}
      </button>
    );

    const StatusBadge = ({ icon: Icon, value, label, isBudget }) => {
      const [flash, setFlash] = useState(false);
      const [prevVal, setPrevVal] = useState(value);
      const [diffText, setDiffText] = useState(null);

      useEffect(() => {
        if (value !== prevVal) {
          const diff = value - prevVal;
          setDiffText(diff > 0 ? `+${diff}` : `${diff}`);
          setFlash(true);
          setPrevVal(value);
          const timer = setTimeout(() => { setFlash(false); setDiffText(null); }, 2000); 
          return () => clearTimeout(timer);
        }
      }, [value, prevVal]);

      return (
        <div className={`flex items-center space-x-2 text-xl font-black bg-white border-4 border-black px-4 py-2 rounded-md transition-all duration-300 relative ${flash ? 'bg-[#ffcf00] scale-110 shadow-[8px_8px_0_#000] z-20 -rotate-2' : 'shadow-[4px_4px_0_#000]'}`}>
          <Icon className="text-[#ffcf00] w-6 h-6 fill-black stroke-black" style={{ strokeWidth: 2 }} />
          <span className={isBudget && value < 300 ? 'text-[#e3000b]' : (!isBudget && value <= 60 ? 'text-[#e3000b]' : 'text-black')}>{isBudget ? `$${value}` : `${value}/100`}</span>
          <span className="text-sm ml-2 hidden sm:inline uppercase">{label}</span>
          {diffText && <span className={`absolute -bottom-8 left-1/2 -translate-x-1/2 text-2xl font-black ${diffText.startsWith('+') ? 'text-[#237841]' : 'text-[#e3000b]'} stroke-black style-stroke animate-bounce z-50`}>{diffText}</span>}
        </div>
      );
    };

    const StatusBar = ({ budget, score }) => (
      <div className="bg-[#0055bf] border-b-8 border-black p-4 flex flex-wrap justify-between items-center z-10">
        <StatusBadge icon={Coins} value={budget} label="Budget" isBudget={true} />
        <div className="text-center hidden md:block">
          <h1 className="text-3xl font-black tracking-widest text-[#ffcf00] stroke-black style-stroke uppercase">暨南 IEQ SCHOOL</h1>
        </div>
        <StatusBadge icon={Star} value={score} label="Score" isBudget={false} />
      </div>
    );

    const MiniBar = ({ label, val, color }) => {
      const [flash, setFlash] = useState(false);
      const [prevVal, setPrevVal] = useState(val);
      const [diffText, setDiffText] = useState(null);

      useEffect(() => {
        if (val !== prevVal) {
          const diff = val - prevVal;
          setDiffText(diff > 0 ? `+${diff}` : `${diff}`);
          setFlash(true);
          setPrevVal(val);
          const timer = setTimeout(() => { setFlash(false); setDiffText(null); }, 2000);
          return () => clearTimeout(timer);
        }
      }, [val, prevVal]);

      return (
        <div className={`flex flex-col relative transition-all duration-300 rounded-sm p-1 ${flash ? 'bg-white shadow-[4px_4px_0_#000] border-4 border-black z-10 scale-[1.05]' : 'border-4 border-transparent'}`}>
          <div className="flex justify-between text-xs lg:text-sm font-black text-black mb-1 uppercase tracking-tighter">
            <span>{label}</span>
            <span className="relative">{val}%{diffText && <span className={`absolute -top-6 right-0 text-lg font-black ${diffText.startsWith('+') ? 'text-[#237841]' : 'text-[#e3000b]'} stroke-black style-stroke animate-bounce z-20`}>{diffText}</span>}</span>
          </div>
          <div className="w-full bg-gray-200 border-4 border-black h-5 lg:h-6 rounded-sm relative overflow-hidden shadow-inner">
            <div className={`h-full ${color} transition-all duration-1000 ease-in-out border-r-4 border-black flex items-center`} style={{ width: `${val}%` }}><div className="w-full h-1 bg-white/30 absolute top-1"></div></div>
          </div>
        </div>
      );
    };

    const CompactBar = ({ label, val, color }) => {
      const [flash, setFlash] = useState(false);
      const [prevVal, setPrevVal] = useState(val);
      const [diffText, setDiffText] = useState(null);

      useEffect(() => {
        if (val !== prevVal) {
          const diff = val - prevVal;
          setDiffText(diff > 0 ? `+${diff}` : `${diff}`);
          setFlash(true);
          setPrevVal(val);
          const timer = setTimeout(() => { setFlash(false); setDiffText(null); }, 2000);
          return () => clearTimeout(timer);
        }
      }, [val, prevVal]);

      return (
        <div className={`flex items-center w-full transition-all duration-300 ${flash ? 'scale-[1.05] bg-black/30 rounded px-1 py-0.5 z-10' : 'px-1 py-0.5'}`}>
          <span className="w-[55px] sm:w-[70px] text-[9px] sm:text-xs font-black text-white uppercase tracking-tighter drop-shadow-[1px_1px_0_#000] truncate">{label}</span>
          <div className="flex-1 bg-black/50 border-2 border-black h-2.5 sm:h-3.5 rounded-sm relative overflow-hidden mx-1 shadow-inner">
            <div className={`h-full ${color} transition-all duration-1000 border-r-2 border-black`} style={{ width: `${val}%` }}></div>
          </div>
          <span className="w-7 text-right text-[9px] sm:text-xs font-black text-white drop-shadow-[1px_1px_0_#000] relative">{val}%{diffText && <span className={`absolute -top-4 right-0 text-xs sm:text-sm font-black ${diffText.startsWith('+') ? 'text-[#4ade80]' : 'text-[#ffcf00]'} drop-shadow-[1px_1px_0_#000] animate-bounce z-20`}>{diffText}</span>}</span>
        </div>
      );
    };

    function App() {
      const [gameState, setGameState] = useState('start'); 
      const [budget, setBudget] = useState(INITIAL_BUDGET);
      const [score, setScore] = useState(INITIAL_SCORE);
      const [ieq, setIeq] = useState({ thermal: 30, iaq: 30, acoustic: 50, ergonomic: 60, lighting: 85 });
      const [activeEvent, setActiveEvent] = useState(null);
      const [solvedEvents, setSolvedEvents] = useState([]);
      const [lastResult, setLastResult] = useState(null);
      const [emojiTick, setEmojiTick] = useState(0);

      useEffect(() => {
        const timer = setInterval(() => setEmojiTick(t => t + 1), 800);
        return () => clearInterval(timer);
      }, []);

      const handleStart = () => setGameState('playing');

      const triggerEvent = (issueKey) => {
        setActiveEvent(ISSUES[issueKey]);
        setGameState('event');
      };

      const handleChoice = (option) => {
        if (budget - option.cost < 0) {
          alert("校長，我們的預算積木用完了！請選擇別的方案！");
          return;
        }
        setLastResult({ text: option.resultText, impact: option.impact, cost: option.cost, eventId: activeEvent.id });
        setGameState('result');
      };

      const closeResult = () => {
        const { impact, cost, eventId } = lastResult;
        setBudget(prev => prev - cost);
        setScore(prev => Math.min(100, Math.max(0, prev + (impact.score || 0))));
        setIeq(prev => ({
          thermal: Math.min(100, Math.max(0, prev.thermal + (impact.thermal || 0))),
          iaq: Math.min(100, Math.max(0, prev.iaq + (impact.iaq || 0))),
          acoustic: Math.min(100, Math.max(0, prev.acoustic + (impact.acoustic || 0))),
          ergonomic: Math.min(100, Math.max(0, prev.ergonomic + (impact.ergonomic || 0))),
          lighting: Math.min(100, Math.max(0, prev.lighting + (impact.lighting || 0)))
        }));

        const newSolvedEvents = [...solvedEvents, eventId];
        setSolvedEvents(newSolvedEvents);

        if (newSolvedEvents.length === Object.keys(ISSUES).length) {
          setGameState('playing'); 
          setTimeout(() => setGameState('end'), 2500); 
        } else {
          setGameState('playing');
        }
      };

      const resetGame = () => {
        setGameState('start');
        setBudget(INITIAL_BUDGET);
        setScore(INITIAL_SCORE);
        setIeq({ thermal: 30, iaq: 30, acoustic: 50, ergonomic: 60, lighting: 85 });
        setSolvedEvents([]);
      };

      return (
        <div className="min-h-screen bg-[#ffcf00] font-sans flex flex-col overflow-hidden">
          {gameState === 'start' && (
            <div className="flex-1 flex items-center justify-center p-4">
              <div className="bg-white max-w-2xl w-full p-10 rounded-xl border-[6px] border-black shadow-[12px_12px_0_#000] text-center relative z-10">
                <div className="absolute -top-8 left-10 w-24 h-8 bg-[#e3000b] border-4 border-black rounded-sm shadow-[4px_4px_0_#000]"></div>
                <div className="absolute -top-8 right-16 w-16 h-8 bg-[#0055bf] border-4 border-black rounded-sm shadow-[4px_4px_0_#000]"></div>
                <div className="inline-block p-4 bg-[#ffcf00] border-4 border-black shadow-[4px_4px_0_#000] rounded-lg mb-6 rotate-[-5deg]"><span className="text-6xl">🏫</span></div>
                <h1 className="text-4xl md:text-5xl font-black text-black mb-6 uppercase tracking-wider">校長的樂高教室</h1>
                <p className="text-lg text-black mb-8 font-bold leading-relaxed border-4 border-black p-4 bg-gray-100 shadow-[4px_4px_0_#000] text-left">
                  根據論文問卷，巴勒斯坦學生的教室面臨 IEQ 挑戰！<br/><br/>身為校長，你有 <strong className="text-white bg-[#237841] px-2 py-1 rounded-sm border-2 border-black">$1000 預算</strong>。<br/>請找出教室裡<strong className="text-white bg-[#e3000b] px-2 py-1 rounded-sm border-2 border-black mx-1">舉手抱怨的積木人</strong>，並做出改善決策吧！
                </p>
                <LegoButton colorClass="bg-[#237841] text-white text-2xl w-full py-4" onClick={handleStart}>進入教室 START</LegoButton>
              </div>
            </div>
          )}

          {gameState !== 'start' && (
            <>
              <StatusBar budget={budget} score={score} />
              
              <div className="flex-1 flex flex-col max-w-[1400px] mx-auto w-full p-2 lg:p-6 gap-6">
                <div className="hidden md:flex bg-white rounded-md p-4 shadow-[8px_8px_0_#000] border-[6px] border-black flex-col xl:flex-row items-center gap-4">
                  <div className="flex flex-col items-center justify-center">
                    <h2 className="text-lg lg:text-xl font-black text-black flex items-center border-4 border-black p-3 bg-[#ffcf00] shadow-[4px_4px_0_#000] uppercase whitespace-nowrap">
                      <AlertTriangle className="w-6 h-6 lg:w-7 lg:h-7 text-[#e3000b] mr-2 fill-current" />DashBoard
                    </h2>
                  </div>
                  <div className="flex-1 w-full grid grid-cols-2 lg:grid-cols-5 gap-3 lg:gap-4 bg-gray-100 p-4 rounded-sm border-4 border-black shadow-[4px_4px_0_rgba(0,0,0,0.1)_inset]">
                    <MiniBar label="Thermal 溫度" val={ieq.thermal} color="bg-[#0055bf]" />
                    <MiniBar label="IAQ 空氣" val={ieq.iaq} color="bg-[#237841]" />
                    <MiniBar label="Acoustic 聲學" val={ieq.acoustic} color="bg-[#e3000b]" />
                    <MiniBar label="Furniture 傢俱" val={ieq.ergonomic} color="bg-[#d97706]" />
                    <MiniBar label="Lighting 照明" val={ieq.lighting} color="bg-[#ffcf00]" />
                  </div>
                </div>

                <div className="flex-1 relative bg-white border-[6px] border-black overflow-hidden shadow-[8px_8px_0_#000] flex flex-col rounded-md min-h-[500px]">
                  <div className="h-auto min-h-[14rem] md:min-h-0 md:h-56 lego-wall relative border-b-8 border-black flex items-center md:items-end justify-center pb-4 pt-4 md:pt-0 z-0">
                    <div className="hidden md:flex absolute top-6 left-8 w-32 h-24 bg-[#0055bf] border-[6px] border-black shadow-[4px_4px_0_#000] flex-col">
                      <div className="flex-1 grid grid-cols-2 gap-1 p-1 bg-black"><div className="bg-[#40b0ff] relative overflow-hidden flex items-center justify-center text-4xl">☀️</div><div className="bg-[#40b0ff]"></div></div>
                    </div>
                    <div className="w-11/12 md:w-3/5 h-auto md:h-36 bg-[#237841] border-[6px] border-[#6b4226] shadow-[6px_6px_0_#000] flex flex-col items-center justify-center p-2 relative z-10 mb-8 md:mb-0">
                      <span className="hidden md:block text-white font-black text-2xl tracking-widest uppercase text-center">IEQ Research<br/>Mission</span>
                      <div className="flex md:hidden flex-col w-full gap-1 px-1 pb-1">
                         <CompactBar label="Thermal" val={ieq.thermal} color="bg-[#0055bf]" />
                         <CompactBar label="IAQ" val={ieq.iaq} color="bg-[#4ade80]" />
                         <CompactBar label="Acoustic" val={ieq.acoustic} color="bg-[#e3000b]" />
                         <CompactBar label="Furnit." val={ieq.ergonomic} color="bg-[#fbbf24]" />
                         <CompactBar label="Lighting" val={ieq.lighting} color="bg-[#fcd34d]" />
                      </div>
                      <div className="absolute bottom-2 right-4 w-8 h-3 bg-white border-2 border-black shadow-[2px_2px_0_#000] -rotate-6"></div> 
                    </div>
                    <div className="absolute bottom-0 right-4 md:-bottom-2 md:right-[15%] flex flex-col items-center">
                      <div className="text-5xl md:text-6xl z-10 drop-shadow-[2px_2px_0_rgba(0,0,0,1)]">👩‍🏫</div>
                      <div className="w-20 md:w-28 h-10 md:h-14 bg-[#ffcf00] border-4 border-black -mt-4 z-20 shadow-[4px_4px_0_#000] relative rounded-sm flex justify-center items-start">
                         <div className="w-3 h-3 md:w-4 md:h-4 rounded-full border-2 border-black bg-[#ffcf00] mt-1"></div>
                      </div>
                    </div>
                  </div>

                  <div className="flex-1 lego-baseplate p-4 md:p-6 pt-20 md:pt-28 overflow-y-auto relative z-10">
                    <div className="grid grid-cols-3 md:grid-cols-4 gap-y-16 md:gap-y-20 gap-x-2 md:gap-x-4 max-w-4xl mx-auto h-full place-items-center">
                      {STUDENTS_GRID.map((student) => {
                        const issueData = student.issueKey ? ISSUES[student.issueKey] : null;
                        const isSolved = student.issueKey && solvedEvents.includes(student.issueKey);
                        let currentFace = student.defaultFace;
                        
                        if (issueData && !isSolved) currentFace = issueData.emojis[emojiTick % issueData.emojis.length];
                        if (issueData && isSolved) currentFace = (student.issueKey === 'thermal') ? '😌' : (student.issueKey === 'lighting' ? '✨' : '😊');

                        return (
                          <div key={student.id} onClick={() => { if (issueData && !isSolved) triggerEvent(student.issueKey); }} className={`relative flex flex-col items-center justify-end w-full group outline-none z-10 hover:z-50 ${issueData && !isSolved ? 'cursor-pointer' : ''}`}>
                            {issueData && !isSolved && (
                              <div className="absolute -top-16 md:-top-20 bg-white px-2 py-1 md:px-3 md:py-2 border-[4px] border-black shadow-[4px_4px_0_#000] flex items-center gap-1 group-hover:bg-[#ffcf00] transition-colors rounded-sm z-50">
                                <span className="text-xl md:text-2xl animate-bounce">💬</span>
                                <span className="text-[10px] md:text-sm font-black text-black uppercase hidden sm:inline">Click!</span>
                                <div className="absolute -bottom-2 md:-bottom-3 left-1/2 -translate-x-1/2 w-3 h-3 md:w-4 md:h-4 bg-inherit border-b-[4px] border-r-[4px] border-black rotate-45"></div>
                              </div>
                            )}
                            <div className={`text-5xl md:text-6xl z-20 drop-shadow-[2px_2px_0_rgba(0,0,0,1)] transition-transform duration-300 ${issueData && !isSolved ? 'animate-[sway_0.8s_ease-in-out_infinite] scale-110 group-hover:scale-125' : 'group-hover:-translate-y-2'}`}>{currentFace}</div>
                            <div className={`w-16 h-10 md:w-24 md:h-12 ${student.deskColor} border-4 border-black rounded-sm -mt-4 md:-mt-6 z-30 shadow-[4px_4px_0_rgba(0,0,0,1)] relative flex flex-col items-center pt-1 px-1`}>
                              <div className="w-full flex justify-between px-0.5 md:px-1">
                                <div className="w-2 h-2 md:w-3 md:h-3 rounded-full border-2 border-black bg-inherit opacity-80"></div>
                                <div className="w-2 h-2 md:w-3 md:h-3 rounded-full border-2 border-black bg-inherit opacity-80"></div>
                                <div className="w-2 h-2 md:w-3 md:h-3 rounded-full border-2 border-black bg-inherit opacity-80"></div>
                                <div className="w-2 h-2 md:w-3 md:h-3 rounded-full border-2 border-black bg-inherit opacity-80"></div>
                              </div>
                              {student.id % 2 === 0 && <div className="absolute bottom-1 md:bottom-2 right-1 md:right-2 w-6 h-3 md:w-8 md:h-4 bg-white border-2 border-black rotate-[-10deg] shadow-[2px_2px_0_#000]"></div>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
            </>
          )}

          {gameState === 'event' && activeEvent && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
              <div className="bg-white rounded-md max-w-lg w-full p-6 md:p-8 shadow-[12px_12px_0_#000] border-[6px] border-black animate-[slideIn_0.3s_ease-out] relative">
                <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-[#ffcf00] border-4 border-black px-4 md:px-6 py-1 md:py-2 rounded-sm shadow-[4px_4px_0_#000] z-10 font-black uppercase tracking-wider text-sm md:text-base whitespace-nowrap">{activeEvent.name}</div>
                <div className="flex items-center space-x-2 md:space-x-4 mb-6 mt-4">
                  <span className="text-6xl md:text-7xl drop-shadow-[4px_4px_0_rgba(0,0,0,1)] animate-[sway_0.8s_ease-in-out_infinite]">{activeEvent.emojis[emojiTick % activeEvent.emojis.length]}</span>
                  <div className="bg-gray-100 p-3 md:p-4 border-4 border-black rounded-sm shadow-[4px_4px_0_#000] font-bold text-black flex-1 relative text-sm md:text-base">
                    <div className="absolute top-1/2 -left-3 -translate-y-1/2 w-4 h-4 bg-gray-100 border-l-4 border-b-4 border-black rotate-45"></div>{activeEvent.studentQuote}
                  </div>
                </div>
                <div className="bg-[#0055bf] text-white p-3 md:p-4 rounded-sm border-4 border-black mb-6 shadow-[4px_4px_0_#000] font-bold text-sm md:text-base">{activeEvent.paperFact}</div>
                <h3 className="font-black text-black mb-4 text-lg md:text-xl uppercase border-b-4 border-black pb-2">Choose Action:</h3>
                <div className="space-y-4 max-h-[40vh] overflow-y-auto p-1">
                  {activeEvent.options.map((opt, idx) => (
                    <button key={idx} onClick={() => handleChoice(opt)} className="w-full text-left p-3 md:p-4 bg-white border-4 border-black hover:bg-[#ffcf00] shadow-[6px_6px_0_#000] active:translate-y-1 active:translate-x-1 active:shadow-[2px_2px_0_#000] transition-all font-black text-black flex flex-col md:flex-row justify-between items-start md:items-center outline-none gap-2 md:gap-0">
                      <span className="pr-0 md:pr-4 pointer-events-none text-sm md:text-base">{opt.text}</span>
                      <span className={`text-xs md:text-sm whitespace-nowrap px-3 py-1 rounded-sm border-2 border-black pointer-events-none ${opt.cost > 0 ? 'bg-[#e3000b] text-white' : 'bg-[#237841] text-white'}`}>{opt.cost > 0 ? `-$${opt.cost}` : (opt.cost < 0 ? `+$${Math.abs(opt.cost)}` : 'FREE')}</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {gameState === 'result' && lastResult && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm">
              <div className="bg-white rounded-md max-w-sm w-full p-6 md:p-8 shadow-[12px_12px_0_#000] border-[6px] border-black text-center relative">
                <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-[#237841] border-4 border-black px-6 py-2 rounded-sm shadow-[4px_4px_0_#000] z-10"><CheckSquare className="w-8 h-8 text-white fill-current" /></div>
                <h2 className="text-2xl md:text-3xl font-black text-black mt-6 mb-4 uppercase">Result</h2>
                <p className="text-base md:text-lg text-black font-bold mb-6 bg-gray-100 p-4 border-4 border-black rounded-sm shadow-inner text-left">{lastResult.text}</p>
                <div className="flex justify-center flex-wrap gap-2 md:gap-3 mb-8">
                  {Object.entries(lastResult.impact).map(([key, val]) => {
                    if (!val || val === 0) return null;
                    const isPos = val > 0;
                    const labels = { thermal: '溫度', iaq: '空氣', acoustic: '聲學', ergonomic: '傢俱', lighting: '照明', score: '滿意度' };
                    return (
                      <span key={key} className={`px-3 md:px-4 py-1.5 md:py-2 border-4 border-black rounded-sm text-xs md:text-sm font-black shadow-[4px_4px_0_#000] ${isPos ? 'bg-[#237841] text-white' : 'bg-[#e3000b] text-white'}`}>
                        {labels[key]} {isPos ? '+' : ''}{val}
                      </span>
                    );
                  })}
                </div>
                <LegoButton colorClass="bg-[#ffcf00] text-black text-lg md:text-xl w-full" onClick={closeResult}>繼續巡視教室</LegoButton>
              </div>
            </div>
          )}

          {gameState === 'end' && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm overflow-y-auto">
              <div className="bg-white max-w-2xl w-full p-6 md:p-10 shadow-[16px_16px_0_#000] border-[8px] border-black relative rounded-md my-8">
                <div className="absolute -top-10 md:-top-12 left-1/2 -translate-x-1/2 text-6xl md:text-8xl drop-shadow-[4px_4px_0_rgba(0,0,0,1)]">🏆</div>
                <div className="text-center mb-8 md:mb-10 mt-6 md:mt-8">
                  <h1 className="text-3xl md:text-4xl font-black text-black mb-2 uppercase">任務完成！</h1>
                  <p className="text-sm md:text-xl text-black font-bold bg-[#ffcf00] border-4 border-black inline-block px-3 py-1 md:px-4 md:py-1 shadow-[4px_4px_0_#000]">這就是巴勒斯坦公立學校的真實困境</p>
                </div>
                <div className="grid grid-cols-2 gap-4 md:gap-6 mb-8 md:mb-10">
                  <div className="bg-white p-4 md:p-6 rounded-sm text-center border-4 border-black shadow-[6px_6px_0_#000] relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-2 bg-[#ffcf00]"></div>
                    <div className="text-xs md:text-sm font-black text-gray-500 mb-1 md:mb-2 uppercase">剩餘預算</div>
                    <div className="text-3xl md:text-5xl font-black text-black">${budget}</div>
                  </div>
                  <div className="bg-white p-4 md:p-6 rounded-sm text-center border-4 border-black shadow-[6px_6px_0_#000] relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-2 bg-[#0055bf]"></div>
                    <div className="text-xs md:text-sm font-black text-gray-500 mb-1 md:mb-2 uppercase">最終滿意度</div>
                    <div className="text-3xl md:text-5xl font-black text-black">{score}<span className="text-xl md:text-2xl">/100</span></div>
                  </div>
                </div>
                <div className="bg-[#f8fafc] p-4 md:p-6 rounded-sm mb-8 border-[6px] border-[#0055bf] shadow-[6px_6px_0_#000]">
                  <h3 className="font-black text-black text-lg md:text-2xl mb-4 flex items-center uppercase"><BookOpen className="w-6 h-6 md:w-8 md:h-8 mr-2 md:mr-3 fill-[#0055bf] text-black" /> 論文核心 Takeaway</h3>
                  <ul className="space-y-4 text-black font-bold text-sm md:text-lg">
                    <li className="flex items-start"><div className="bg-[#e3000b] text-white px-2 border-2 border-black mr-2 md:mr-3 shadow-[2px_2px_0_#000]">1</div><div>指標會互相牽制：解決溫度關窗會毀了空氣；通風開窗又會引進噪音。</div></li>
                    <li className="flex items-start"><div className="bg-[#ffcf00] text-black px-2 border-2 border-black mr-2 md:mr-3 shadow-[2px_2px_0_#000]">2</div><div>被動式設計：在缺乏冷暖氣系統下，使用被動設計（如吸音泥）是最務實的解法。</div></li>
                    <li className="flex items-start"><div className="bg-[#237841] text-white px-2 border-2 border-black mr-2 md:mr-3 shadow-[2px_2px_0_#000]">3</div><div>整體評估：未來的學校設計初期，就必須將 IEQ 進行綜合評估，不能頭痛醫頭。</div></li>
                  </ul>
                </div>
                <LegoButton colorClass="bg-black text-white text-lg md:text-2xl w-full py-3 md:py-4 flex items-center justify-center" onClick={resetGame}><RefreshCcw className="w-5 h-5 md:w-6 md:h-6 mr-2 md:mr-3" /> 再玩一次</LegoButton>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
